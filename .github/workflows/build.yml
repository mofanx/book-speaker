name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate platform files
        run: flutter create --project-name book_speaker --org com.bookspeaker .

      - name: Patch Android config
        run: |
          # Patch AndroidManifest.xml for TTS queries
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i '/<application/i \    <queries>\n        <intent>\n            <action android:name="android.intent.action.TTS_SERVICE" />\n        </intent>\n    </queries>\n' "$MANIFEST"
          fi

          # Detect Kotlin DSL (.kts) vs Groovy (.gradle)
          if [ -f "android/settings.gradle.kts" ]; then
            SETTINGS="android/settings.gradle.kts"
          else
            SETTINGS="android/settings.gradle"
          fi
          if [ -f "android/app/build.gradle.kts" ]; then
            BUILD="android/app/build.gradle.kts"
          else
            BUILD="android/app/build.gradle"
          fi

          echo "==> Patching $SETTINGS and $BUILD"

          # Upgrade Kotlin version (handles both id("...") and id "..." syntax)
          sed -i -E 's/(org\.jetbrains\.kotlin\.android.* version ")([^"]*)/\12.1.0/' "$SETTINGS"

          # Set compileSdk to 36 (handles both = and without =)
          sed -i -E 's/compileSdk\s*=\s*(flutter\.compileSdkVersion|[0-9]+)/compileSdk = 36/' "$BUILD"

          # Create ProGuard rules for google_mlkit (suppress unused language module warnings)
          cat > android/app/proguard-rules.pro << 'RULES'
          -dontwarn com.google.mlkit.vision.text.chinese.**
          -dontwarn com.google.mlkit.vision.text.devanagari.**
          -dontwarn com.google.mlkit.vision.text.japanese.**
          -dontwarn com.google.mlkit.vision.text.korean.**
          RULES

          # Add proguardFiles reference into the release buildType
          sed -i '/signingConfig.*debug/a\            proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")' "$BUILD"

          echo "--- $SETTINGS ---"
          cat "$SETTINGS"
          echo "--- $BUILD ---"
          cat "$BUILD"

      - name: Install dependencies
        run: flutter pub get

      - name: Setup signing key
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks

          # Detect build file
          if [ -f "android/app/build.gradle.kts" ]; then
            BUILD="android/app/build.gradle.kts"
            # Kotlin DSL signing config
            sed -i '/buildTypes {/i \
            val keystoreFile = file("keystore.jks")\
            signingConfigs {\
                create("release") {\
                    storeFile = keystoreFile\
                    storePassword = System.getenv("STORE_PASSWORD") ?: ""\
                    keyAlias = System.getenv("KEY_ALIAS") ?: ""\
                    keyPassword = System.getenv("KEY_PASSWORD") ?: ""\
                }\
            }' "$BUILD"
            sed -i 's/signingConfig = signingConfigs.getByName("debug")/signingConfig = signingConfigs.getByName("release")/' "$BUILD"
          else
            BUILD="android/app/build.gradle"
            # Groovy DSL signing config
            sed -i '/buildTypes {/i \
            signingConfigs {\
                release {\
                    storeFile file("keystore.jks")\
                    storePassword System.getenv("STORE_PASSWORD")\
                    keyAlias System.getenv("KEY_ALIAS")\
                    keyPassword System.getenv("KEY_PASSWORD")\
                }\
            }' "$BUILD"
            sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/' "$BUILD"
          fi

          echo "--- Signing configured in $BUILD ---"

      - name: Build Release APK
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: flutter build apk --release

      - name: Get App Version
        id: app_version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/book-speaker-v$VERSION.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: book-speaker-v${{ env.VERSION }}
          path: build/app/outputs/flutter-apk/book-speaker-v${{ env.VERSION }}.apk
