name: book_speaker
description: English reading assistant for children - tap any sentence to hear it spoken aloud.
publish_to: 'none'
version: 1.6.0+6

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_tts:
    path: ./dependencies/flutter_tts
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.1.2
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  http: ^1.2.0
  audioplayers: ^6.0.0
  android_intent_plus: ^5.1.0
  file_picker: ^8.1.4
  share_plus: ^10.1.3
  package_info_plus: ^8.1.2
  url_launcher: ^6.3.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
