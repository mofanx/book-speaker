name: flutter_tts
description: A flutter plugin for Text to Speech. Patched for Xiaomi HyperOS compatibility.
version: 4.2.3
homepage: https://github.com/dlutton/flutter_tts

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.tundralabs.fluttertts
        pluginClass: FlutterTtsPlugin
      ios:
        pluginClass: FlutterTtsPlugin

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=1.22.0"

dev_dependencies:
  lints: ^3.0.0
